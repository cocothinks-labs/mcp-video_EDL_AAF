on:
  push:
    branches: [master]
  pull_request:
jobs:
  test:
    # Runs on any runner with the shared `docker` label (both CI runners),
    # restoring dual-runner redundancy. The earlier `docker-egress` pin worked
    # around a NUCBox network fault (multi-homing + strict rp_filter dropping
    # container egress), fixed and self-healing as of 2026-06-13.
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv ffmpeg
      - name: Install package
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet -e ".[dev]"
      - name: Lint
        run: .venv/bin/ruff check .
      - name: Test
        run: .venv/bin/pytest tests/ -q -m "not slow"
