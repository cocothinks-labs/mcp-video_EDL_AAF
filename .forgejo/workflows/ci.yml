on:
  push:
    branches: [master]
  pull_request:
jobs:
  test:
    # Heavy job: ffmpeg + full dependency tree + the ~1464-test suite (~5 min).
    # Pinned to the `heavy` runner label so it runs ONLY on the 32-core NUCBox
    # runner and never lands on the capacity-1 VPS runner that co-hosts the
    # production Forgejo git server. Intensity-based routing (2026-06-13):
    # nucbox-ci advertises `heavy`, vps-runner-01 advertises `light`.
    runs-on: heavy
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv ffmpeg
      - name: Install package
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet -e ".[dev]"
      - name: Lint
        run: .venv/bin/ruff check .
      - name: Test
        run: .venv/bin/pytest tests/ -q -m "not slow"
