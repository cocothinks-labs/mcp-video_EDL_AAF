on:
  push:
    branches: [master]
  pull_request:
jobs:
  test:
    # docker-egress is served only by runners with verified container egress;
    # the shared `docker` label includes a runner whose containers currently
    # cannot reach apt/pip mirrors (NUCBox, diagnosed 2026-06-12).
    runs-on: docker-egress
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv ffmpeg
      - name: Install package
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet -e ".[dev]"
      - name: Lint
        run: .venv/bin/ruff check .
      - name: Test
        run: .venv/bin/pytest tests/ -q -m "not slow"
